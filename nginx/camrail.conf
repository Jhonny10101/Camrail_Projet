# ─── CAMRAIL — Configuration Nginx (Reverse Proxy Intranet) ─────────────────
# Fichier : /etc/nginx/conf.d/camrail.conf

upstream camrail_api {
    server camrail-api:8000;
    keepalive 32;
}

upstream camrail_frontend {
    server camrail-frontend:3000;
    keepalive 16;
}

# ── Redirection HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name camrail-predict.intranet.cm;
    return 301 https://$host$request_uri;
}

# ── Serveur principal HTTPS ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name camrail-predict.intranet.cm;

    # ── Certificats SSL (générés en interne par IT CAMRAIL) ──
    ssl_certificate     /etc/nginx/ssl/camrail.crt;
    ssl_certificate_key /etc/nginx/ssl/camrail.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Sécurité headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # ── Taille max upload (RET avec pièces jointes) ──────────
    client_max_body_size 10M;

    # ── Timeouts ─────────────────────────────────────────────
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── API FastAPI ──────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://camrail_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS pour l'intranet CAMRAIL
        add_header Access-Control-Allow-Origin  "https://camrail-predict.intranet.cm" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"     always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"         always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Swagger UI (docs) ────────────────────────────────────
    location /api/docs {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://camrail_api;
        proxy_set_header Host $host;
    }

    # ── Frontend React ───────────────────────────────────────
    location / {
        proxy_pass         http://camrail_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Cache pour assets statiques
        location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
            proxy_pass http://camrail_frontend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Healthcheck Nginx ────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/camrail_access.log combined;
    error_log  /var/log/nginx/camrail_error.log  warn;
}
